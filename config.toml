# rustdns configuration

[server]
bind            = "0.0.0.0"
port            = 53
use_forwarders  = true        # try /etc/resolv.conf nameservers first
dnssec_validate = true        # validate DNSSEC signatures
log_level       = "info"
tcp_timeout_ms  = 5000

[cache]
max_entries = 100000
neg_ttl     = 300             # negative cache TTL (seconds), overridden by SOA MINIMUM

[zones]
files = ["example.com.zone", "internal.lan.zone"]

[ratelimit]
queries_per_second = 100
per_ip             = true
